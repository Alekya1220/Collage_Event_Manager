<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | College Event Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../public/css/styles.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-calendar-event-fill"></i>
                College Event Manager
            </a>

            <div class="ms-auto">

                <span class="text-white me-3">
                    Welcome,
                    <span id="userName"></span>
                </span>

                <button
                    class="btn btn-light btn-sm"
                    onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <!-- MAIN CONTENT -->

    <div class="container py-4">

        <h2 class="mb-4">
            Dashboard Overview
        </h2>

        <!-- STATS -->

        <div class="row g-4">

            <div class="col-md-3">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-calendar-event text-primary fs-1"></i>

                        <h3 id="totalEvents">0</h3>

                        <p>Total Events</p>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-clock-history text-success fs-1"></i>

                        <h3 id="upcomingEvents">0</h3>

                        <p>Upcoming Events</p>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-check-circle text-warning fs-1"></i>

                        <h3 id="completedEvents">0</h3>

                        <p>Completed Events</p>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-people-fill text-danger fs-1"></i>

                        <h3 id="totalUsers">0</h3>

                        <p>Users</p>

                    </div>

                </div>

            </div>

        </div>

        <!-- QUICK ACTIONS -->

        <div class="card shadow border-0 mt-5">

            <div class="card-body">

                <h4 class="mb-3">
                    Quick Actions
                </h4>

                <a href="add.html"
                    class="btn btn-success me-2">

                    <i class="bi bi-plus-circle"></i>
                    Add Event

                </a>

                <a href="list.html"
                    class="btn btn-primary">

                    <i class="bi bi-list-ul"></i>
                    Manage Events

                </a>

            </div>

        </div>

        <!-- RECENT EVENTS -->

        <div class="card shadow border-0 mt-4">

            <div class="card-body">

                <h4 class="mb-3">
                    Recent Events
                </h4>

                <table class="table table-hover">

                    <thead>

                        <tr>
                            <th>Event Name</th>
                            <th>Date</th>
                            <th>Location</th>
                        </tr>

                    </thead>

                    <tbody id="recentEventsTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="../public/js/script.js"></script>

</body>

</html>
