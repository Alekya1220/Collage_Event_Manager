<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Event | College Event Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="../public/css/styles.css">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="dashboard.html">

                <i class="bi bi-calendar-event-fill"></i>

                College Event Manager

            </a>

            <a href="list.html"
                class="btn btn-light">

                Back to Events

            </a>

        </div>

    </nav>

    <!-- Edit Event Form -->

    <div class="container py-5">

        <div class="card shadow border-0">

            <div class="card-header bg-warning">

                <h3 class="mb-0">

                    <i class="bi bi-pencil-square"></i>

                    Edit Event

                </h3>

            </div>

            <div class="card-body p-4">

                <form id="editEventForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Event Name
                            </label>

                            <input
                                type="text"
                                id="editName"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <input
                                type="text"
                                id="editCategory"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Date
                            </label>

                            <input
                                type="date"
                                id="editDate"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Time
                            </label>

                            <input
                                type="time"
                                id="editTime"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Venue
                            </label>

                            <input
                                type="text"
                                id="editVenue"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Organizer
                            </label>

                            <input
                                type="text"
                                id="editOrganizer"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            id="editDescription"
                            rows="4"
                            class="form-control"
                            required></textarea>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Status
                        </label>

                        <select
                            id="editStatus"
                            class="form-select">

                            <option>
                                Upcoming
                            </option>

                            <option>
                                Completed
                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-warning">

                        <i class="bi bi-save"></i>

                        Update Event

                    </button>

                </form>

            </div>

        </div>

    </div>

    <script src="../public/js/script.js"></script>

</body>

</html>
