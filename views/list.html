<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Event List | College Event Manager</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
        href="../public/css/styles.css">

</head>

<body class="bg-light">

    <!-- ===========================
            NAVBAR
    ============================ -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="dashboard.html">

                <i class="bi bi-calendar-event-fill"></i>

                College Event Manager

            </a>

            <div>

                <a href="dashboard.html"
                    class="btn btn-light me-2">

                    <i class="bi bi-speedometer2"></i>

                    Dashboard

                </a>

                <a href="add.html"
                    class="btn btn-success">

                    <i class="bi bi-plus-circle"></i>

                    Add Event

                </a>

            </div>

        </div>

    </nav>



    <!-- ===========================
            PAGE CONTENT
    ============================ -->

    <div class="container py-5">

        <!-- PAGE TITLE -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="fw-bold">

                    <i class="bi bi-calendar2-week"></i>

                    Event Management

                </h2>

                <p class="text-muted">

                    View, Search, Edit and Delete Events

                </p>

            </div>

        </div>



        <!-- ===========================
                STATISTICS
        ============================ -->

        <div class="row g-4 mb-4">

            <div class="col-md-4">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-calendar-event text-primary display-5"></i>

                        <h3 id="totalEvents">0</h3>

                        <p class="text-muted mb-0">
                            Total Events
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-clock-history text-warning display-5"></i>

                        <h3 id="upcomingEvents">0</h3>

                        <p class="text-muted mb-0">
                            Upcoming Events
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card dashboard-card border-0 shadow">

                    <div class="card-body text-center">

                        <i class="bi bi-check-circle-fill text-success display-5"></i>

                        <h3 id="completedEvents">0</h3>

                        <p class="text-muted mb-0">
                            Completed Events
                        </p>

                    </div>

                </div>

            </div>

        </div>



        <!-- ===========================
                EVENT TABLE
        ============================ -->

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h4 class="mb-0">

                    <i class="bi bi-list-task"></i>

                    Event List

                </h4>

            </div>

            <div class="card-body">

                <!-- SEARCH -->

                <div class="row mb-4">

                    <div class="col-md-6">

                        <div class="input-group event-search">

                            <span class="input-group-text">

                                <i class="bi bi-search"></i>

                            </span>

                            <input

                                type="text"

                                id="searchEvent"

                                class="form-control search-input"

                                placeholder="Search by Event Name, Category or Venue">

                        </div>

                    </div>

                </div>



                <!-- TABLE -->

                <div class="table-responsive">

                    <table class="table table-hover align-middle event-table">

                        <thead>

                            <tr>

                                <th>Event</th>

                                <th>Category</th>

                                <th>Date</th>

                                <th>Venue</th>

                                <th>Status</th>

                                <th class="text-center">

                                    Actions

                                </th>

                            </tr>

                        </thead>

                        <tbody id="eventTableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>



    <script src="../public/js/script.js"></script>

</body>

</html>
