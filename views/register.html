<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Management System - Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../public/css/styles.css">
</head>

<body class="login-body">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <!-- LEFT SECTION -->

            <div class="col-lg-7 d-none d-lg-flex hero-section">

                <div class="hero-content">

                    <span class="badge bg-light text-primary mb-4">
                        Campus Event Management Platform
                    </span>

                    <h1>
                        Join Our Event
                        <br>
                        Management System
                    </h1>

                    <p class="mt-3">
                        Create an account and start managing
                        college events efficiently.
                    </p>

                    <div class="feature-list mt-5">

                        <div class="feature-item">
                            <i class="bi bi-check-circle-fill"></i>
                            Easy Registration
                        </div>

                        <div class="feature-item">
                            <i class="bi bi-check-circle-fill"></i>
                            Manage College Events
                        </div>

                        <div class="feature-item">
                            <i class="bi bi-check-circle-fill"></i>
                            Track Event Activities
                        </div>

                        <div class="feature-item">
                            <i class="bi bi-check-circle-fill"></i>
                            Secure User Access
                        </div>

                    </div>

                </div>

            </div>

            <!-- RIGHT REGISTER SECTION -->

            <div class="col-lg-5 d-flex justify-content-center align-items-center">

                <div class="login-card">

                    <div class="text-center mb-4">

                        <i class="bi bi-person-plus-fill logo-icon"></i>

                        <h2 class="mt-3">
                            Create Account
                        </h2>

                        <p>
                            Register to continue
                        </p>

                    </div>

                    <form id="registerForm">

                        <!-- NAME -->

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-person-fill"></i>
                                </span>

                                <input
                                    type="text"
                                    id="name"
                                    class="form-control"
                                    placeholder="Enter Full Name"
                                    required>

                            </div>

                        </div>

                        <!-- EMAIL -->

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-envelope-fill"></i>
                                </span>

                                <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                    placeholder="Enter Email Address"
                                    required>

                            </div>

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>

                                <input
                                    type="password"
                                    id="password"
                                    class="form-control"
                                    placeholder="Enter Password"
                                    required>

                                <button
                                    type="button"
                                    class="btn password-toggle"
                                    onclick="toggleRegisterPassword()">

                                    <i id="registerEye"
                                        class="bi bi-eye-slash-fill"></i>

                                </button>

                            </div>

                        </div>

                        <!-- CONFIRM PASSWORD -->

                        <div class="mb-3">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-shield-lock-fill"></i>
                                </span>

                                <input
                                    type="password"
                                    id="confirmPassword"
                                    class="form-control"
                                    placeholder="Confirm Password"
                                    required>

                            </div>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100 py-2">
                            Register
                        </button>

                    </form>

                    <div class="text-center mt-4">

                        Already have an account?

                        <a href="login.html"
                            class="text-warning fw-bold text-decoration-none">
                            Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="../public/js/script.js"></script>

</body>

</html>
