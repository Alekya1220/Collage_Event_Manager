<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>View Event | College Event Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
        href="../public/css/styles.css">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="dashboard.html">

                <i class="bi bi-calendar-event-fill"></i>

                College Event Manager

            </a>

            <a href="list.html"
                class="btn btn-light">

                Back to Events

            </a>

        </div>

    </nav>

    <!-- Event Details -->

    <div class="container py-5">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">

                    <i class="bi bi-eye-fill"></i>

                    Event Details

                </h3>

            </div>

            <div class="card-body p-4">

                <div class="row mb-3">

                    <div class="col-md-6">

                        <h6>Event Name</h6>

                        <p id="viewName"></p>

                    </div>

                    <div class="col-md-6">

                        <h6>Category</h6>

                        <p id="viewCategory"></p>

                    </div>

                </div>

                <div class="row mb-3">

                    <div class="col-md-6">

                        <h6>Date</h6>

                        <p id="viewDate"></p>

                    </div>

                    <div class="col-md-6">

                        <h6>Time</h6>

                        <p id="viewTime"></p>

                    </div>

                </div>

                <div class="row mb-3">

                    <div class="col-md-6">

                        <h6>Venue</h6>

                        <p id="viewVenue"></p>

                    </div>

                    <div class="col-md-6">

                        <h6>Organizer</h6>

                        <p id="viewOrganizer"></p>

                    </div>

                </div>

                <div class="mb-3">

                    <h6>Description</h6>

                    <p id="viewDescription"></p>

                </div>

                <div class="mb-3">

                    <h6>Status</h6>

                    <span
                        id="viewStatus"
                        class="badge bg-success">
                    </span>

                </div>

            </div>

        </div>

    </div>

    <script src="../public/js/script.js"></script>

</body>

</html>
