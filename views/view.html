<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>View Event | College Event Manager</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
        href="../public/css/styles.css">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="dashboard.html">

                <i class="bi bi-calendar-event-fill"></i>

                College Event Manager

            </a>

            <a href="list.html"
                class="btn btn-light">

                Back to Events

            </a>

        </div>

    </nav>

    <!-- Event Details -->

    <div class="container py-5">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">

                    <i class="bi bi-eye-fill"></i>

                    Event Details

                </h3>

            </div>

            <div class="card-body p-4">

                <div class="row g-4">

                    <!-- Event Name -->

                    <div class="col-md-6">

                        <div class="view-label">
                            Event Name
                        </div>

                        <div id="viewName"
                            class="view-box">
                        </div>

                    </div>

                    <!-- Category -->

                    <div class="col-md-6">

                        <div class="view-label">
                            Category
                        </div>

                        <div id="viewCategory"
                            class="view-box">
                        </div>

                    </div>

                    <!-- Date -->

                    <div class="col-md-6">

                        <div class="view-label">
                            Event Date
                        </div>

                        <div id="viewDate"
                            class="view-box">
                        </div>

                    </div>

                    <!-- Time -->

                    <div class="col-md-6">

                        <div class="view-label">
                            Event Time
                        </div>

                        <div id="viewTime"
                            class="view-box">
                        </div>

                    </div>

                    <!-- Venue -->

                    <div class="col-md-6">

                        <div class="view-label">
                            Venue
                        </div>

                        <div id="viewVenue"
                            class="view-box">
                        </div>

                    </div>

                    <!-- Organizer -->

                    <div class="col-md-6">

                        <div class="view-label">
                            Organizer
                        </div>

                        <div id="viewOrganizer"
                            class="view-box">
                        </div>

                    </div>

                    <!-- Description -->

                    <div class="col-12">

                        <div class="view-label">
                            Description
                        </div>

                        <div id="viewDescription"
                            class="view-description">
                        </div>

                    </div>

                    <!-- Status -->

                    <div class="col-12">

                        <div class="view-label">
                            Status
                        </div>

                        <span id="viewStatus"
                            class="badge bg-success fs-6 px-4 py-2">
                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="../public/js/script.js"></script>

</body>

</html>
